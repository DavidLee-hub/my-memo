<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2C6E49">
  <meta name="description" content="나만의 메모장 - PWA 오프라인 메모 앱">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- 앱 아이콘 -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- Pretendard 폰트 -->
  <link rel="stylesheet" href="public/web/variable/pretendardvariable.css">

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="css/style.css">

  <title>HJLEE</title>
</head>
<body>
<div class="app-wrapper">

  <!-- 헤더 -->
  <header class="header">
    <h1 class="header__title">HJLEE</h1>
    <div class="header__actions">
      <!-- 설치 버튼 (PWA 설치 가능 시 표시) -->
      <button class="btn-install" id="btnInstall" hidden>설치</button>
      <!-- 더보기 메뉴 버튼 -->
      <button class="btn-more" id="btnMore" aria-label="더보기">⋮</button>
    </div>
  </header>

  <!-- 더보기 드롭다운 메뉴 -->
  <nav class="more-menu" id="moreMenu" hidden>
    <ul class="more-menu__list">
      <li><button class="more-menu__item" id="btnExport">메모 내보내기</button></li>
      <li>
        <label class="more-menu__item" for="inputImport">메모 가져오기</label>
        <input type="file" id="inputImport" accept=".json" hidden>
      </li>
      <li class="more-menu__divider"></li>
      <li>
        <span class="more-menu__label">글자 크기</span>
        <div class="font-size-group">
          <button class="btn-font-size" data-size="small">작게</button>
          <button class="btn-font-size active" data-size="medium">보통</button>
          <button class="btn-font-size" data-size="large">크게</button>
        </div>
      </li>
      <li><button class="more-menu__item" id="btnDarkMode">다크모드 켜기</button></li>
    </ul>
  </nav>

  <!-- 메인 콘텐츠 -->
  <main class="main">

    <!-- 메모 입력 영역 -->
    <section class="editor" id="editor">
      <!-- 텍스트 입력 (전체 너비) -->
      <textarea
        class="editor__textarea"
        id="memoInput"
        placeholder="내용을 입력하세요..."
      ></textarea>
      <!-- 하단 액션 버튼 (가로 배열) -->
      <div class="editor__actions">
        <button class="btn-camera" id="btnAttach" aria-label="카메라/사진">📷 카메라</button>
        <input type="file" id="inputImage" accept="image/*" capture="environment" hidden>
        <button class="btn-record" id="btnRecord" aria-label="녹음">🎙 녹음</button>
        <button class="btn-star" id="btnStar" aria-label="중요 메모">☆</button>
        <button class="btn-save" id="btnSave">저장</button>
      </div>
      <!-- 이미지 미리보기 영역 -->
      <div class="editor__preview" id="imagePreview" hidden></div>
    </section>

    <!-- 검색 & 필터 영역 -->
    <section class="search-bar">
      <div class="search-bar__wrap">
        <input
          class="search-bar__input"
          type="text"
          id="searchInput"
          placeholder="메모 검색"
          aria-label="메모 검색"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        >
        <span class="search-bar__icon">🔍</span>
      </div>
      <button class="btn-filter" id="btnFilter" aria-label="중요 메모 필터">☆</button>
    </section>

    <!-- 메모 목록 -->
    <section class="memo-list" id="memoList" aria-label="메모 목록">
      <!-- 메모 카드가 여기에 동적으로 생성됩니다 -->
    </section>

    <!-- + FAB 버튼 (새 메모) -->
    <button class="btn-fab" id="btnFab" aria-label="새 메모">+</button>

  </main>

  <!-- 상세보기 패널 -->
  <article class="detail-panel" id="detailPanel" hidden>
    <header class="detail-panel__header">
      <button class="btn-back" id="btnBack" aria-label="뒤로가기">←</button>
      <h2 class="detail-panel__title">메모 상세</h2>
      <div class="detail-panel__actions">
        <button class="btn-share" id="btnShare" aria-label="공유">공유</button>
        <button class="btn-copy" id="btnCopy" aria-label="복사">복사</button>
        <button class="btn-edit" id="btnEdit" aria-label="수정">수정</button>
        <button class="btn-delete" id="btnDelete" aria-label="삭제">삭제</button>
      </div>
    </header>
    <div class="detail-panel__content" id="detailContent"></div>
    <div class="detail-panel__images" id="detailImages"></div>
  </article>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast" aria-live="polite"></div>

</div><!-- /.app-wrapper -->

  <!-- 스크립트 -->
  <script src="js/app.js"></script>
  <script src="js/sw-register.js"></script>

</body>
</html>
